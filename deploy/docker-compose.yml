services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: acalite
      POSTGRES_USER: acalite
      POSTGRES_PASSWORD: acalite
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ../backend
    environment:
      DATABASE_URL: postgresql+psycopg2://acalite:acalite@postgres:5432/acalite
      STORAGE_PATH: /data/documents
    volumes:
      - acalite_data:/data
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  web:
    build:
      context: ../frontend
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  postgres_data:
  acalite_data:
